name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: bun-linux-x64
            artifact: srb-linux-amd64
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            artifact: srb-linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd srb && bun install
      - run: cd srb && bun build --compile --target=${{ matrix.target }} src/cli.ts --outfile ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: srb/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: srb-linux-amd64
      - uses: actions/download-artifact@v4
        with:
          name: srb-linux-arm64
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          files: |
            srb-linux-amd64
            srb-linux-arm64
            install.sh

  docker:
    needs: build
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            artifact: srb-linux-amd64
          - arch: arm64
            platform: linux/arm64
            artifact: srb-linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}

      - run: cp ${{ matrix.artifact }} srb-binary

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: SRB_BINARY=srb-binary
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ inputs.version || github.ref_name }}-${{ matrix.arch }}

  docker-manifest:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          IMAGE="ghcr.io/${{ github.repository }}"
          docker buildx imagetools create \
            -t "$IMAGE:${VERSION}" \
            -t "$IMAGE:latest" \
            "$IMAGE:${VERSION}-amd64" \
            "$IMAGE:${VERSION}-arm64"
