name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: bun-linux-x64
            artifact: srb-linux-amd64
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            artifact: srb-linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd srb && bun install
      - run: cd srb && bun build --compile --target=${{ matrix.target }} src/cli.ts --outfile ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: srb/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: srb-linux-amd64
      - uses: actions/download-artifact@v4
        with:
          name: srb-linux-arm64
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          files: |
            srb-linux-amd64
            srb-linux-arm64
            install.sh

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: srb-linux-amd64
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: srb-linux-arm64
          path: artifacts

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build per-arch images with the correct binary, then push a manifest
      - name: Build and push
        run: |
          set -e
          VERSION="${{ inputs.version || github.ref_name }}"
          IMAGE="ghcr.io/${{ github.repository }}"

          # amd64
          cp artifacts/srb-linux-amd64 srb-binary
          docker buildx build --platform linux/amd64 \
            --build-arg SRB_BINARY=srb-binary \
            -t "$IMAGE:${VERSION}-amd64" \
            --push .

          # arm64
          cp artifacts/srb-linux-arm64 srb-binary
          docker buildx build --platform linux/arm64 \
            --build-arg SRB_BINARY=srb-binary \
            -t "$IMAGE:${VERSION}-arm64" \
            --push .

          # Multi-arch manifest
          docker buildx imagetools create \
            -t "$IMAGE:${VERSION}" \
            -t "$IMAGE:latest" \
            "$IMAGE:${VERSION}-amd64" \
            "$IMAGE:${VERSION}-arm64"
