name: SRB OpenSearch Compare

on:
  workflow_dispatch:
    inputs:
      srb-version:
        description: "srb version to download (e.g. v0.1.0)"
        type: string
        default: "latest"
      opensearch-url:
        description: "OpenSearch URL"
        type: string
        required: true
      opensearch-user:
        description: "OpenSearch user"
        type: string
      index-a:
        description: "First index name"
        type: string
        required: true
      index-b:
        description: "Second index name"
        type: string
        required: true
      sample:
        description: "Fraction of docs to sample (e.g. 0.01 = 1%). Leave empty to compare all."
        type: string

  workflow_call:
    inputs:
      srb-version:
        description: "srb version to download (e.g. v0.1.0)"
        type: string
        default: "latest"
      opensearch-url:
        description: "OpenSearch URL"
        type: string
        required: true
      opensearch-user:
        description: "OpenSearch user"
        type: string
      index-a:
        description: "First index name"
        type: string
        required: true
      index-b:
        description: "Second index name"
        type: string
        required: true
      sample:
        description: "Fraction of docs to sample (e.g. 0.01 = 1%). Leave empty to compare all."
        type: string
    secrets:
      opensearch-password:
        required: false

jobs:
  compare:
    runs-on: ubuntu-latest
    env:
      SRB_OPENSEARCH_URL: ${{ inputs.opensearch-url }}
      SRB_OPENSEARCH_USER: ${{ inputs.opensearch-user }}
      SRB_OPENSEARCH_PASSWORD: ${{ secrets.opensearch-password }}
    steps:
      - uses: actions/checkout@v4

      - name: Install SRB
        env:
          SRB_VERSION: ${{ inputs.srb-version }}
        run: curl -fsSL https://raw.githubusercontent.com/meetsmore/sequin-red-black/main/install.sh | bash

      - name: Compare indexes
        run: |
          ARGS="${{ inputs.index-a }} ${{ inputs.index-b }}"
          if [ -n "${{ inputs.sample }}" ]; then
            ARGS="$ARGS --sample ${{ inputs.sample }}"
          fi
          srb online opensearch compare $ARGS
