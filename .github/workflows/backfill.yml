name: SRB Backfill

on:
  workflow_dispatch:
    inputs:
      indexes-dir:
        description: "Path to indexes directory"
        type: string
        default: "./indexes"
      srb-version:
        description: "srb version to download (e.g. v0.1.0)"
        type: string
        default: "latest"
      sequin-url:
        description: "Sequin API URL"
        type: string
        required: true
      sequin-context:
        description: "Sequin CLI context"
        type: string
      opensearch-url:
        description: "OpenSearch URL"
        type: string
        required: true
      opensearch-user:
        description: "OpenSearch user"
        type: string
      pipeline:
        description: "Pipeline name"
        type: string
        required: true
      color:
        description: "Color to backfill"
        type: string
        required: true

  workflow_call:
    inputs:
      indexes-dir:
        description: "Path to indexes directory"
        type: string
        default: "./indexes"
      srb-version:
        description: "srb version to download (e.g. v0.1.0)"
        type: string
        default: "latest"
      sequin-url:
        description: "Sequin API URL"
        type: string
        required: true
      sequin-context:
        description: "Sequin CLI context"
        type: string
      opensearch-url:
        description: "OpenSearch URL"
        type: string
        required: true
      opensearch-user:
        description: "OpenSearch user"
        type: string
      pipeline:
        description: "Pipeline name"
        type: string
        required: true
      color:
        description: "Color to backfill"
        type: string
        required: true
    secrets:
      sequin-token:
        required: true
      opensearch-password:
        required: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      SRB_SEQUIN_URL: ${{ inputs.sequin-url }}
      SRB_SEQUIN_CONTEXT: ${{ inputs.sequin-context }}
      SRB_SEQUIN_TOKEN: ${{ secrets.sequin-token }}
      SRB_OPENSEARCH_URL: ${{ inputs.opensearch-url }}
      SRB_OPENSEARCH_USER: ${{ inputs.opensearch-user }}
      SRB_OPENSEARCH_PASSWORD: ${{ secrets.opensearch-password }}
      SRB_COMPILED: ./compiled.json
    steps:
      - uses: actions/checkout@v4

      - name: Install Sequin CLI
        run: curl -sf https://raw.githubusercontent.com/sequinstream/sequin/main/cli/installer.sh | sh

      - name: Install SRB
        env:
          SRB_VERSION: ${{ inputs.srb-version }}
        run: curl -fsSL https://raw.githubusercontent.com/sequin-io/sequin-red-black/main/install.sh | bash

      - name: Compile
        run: srb offline compile --indexes ${{ inputs.indexes-dir }} --out compiled.json

      - name: Backfill
        run: srb online backfill ${{ inputs.pipeline }} ${{ inputs.color }}
